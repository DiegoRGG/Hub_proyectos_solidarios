<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo de Proyectos - Proyectos Solidarios</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/styles.css"/>
  <style>
    body.catalog-page {
      background: linear-gradient(160deg, #0f2d70 0%, #1A56E8 45%, #1d4ed8 100%);
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────── */
    .catalog-header {
      text-align: center;
      padding: 48px 24px 36px;
      color: white;
    }
    .catalog-header h1 {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: -.4px;
    }
    .catalog-header p {
      font-size: .95rem;
      opacity: .75;
      margin-top: 8px;
    }
    .catalog-stats-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    .catalog-stat-chip {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: .8rem;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Search + filters ─────────────────────────── */
    .catalog-search-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .search-bar {
      background: white;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
      margin-bottom: 14px;
    }
    .search-bar input {
      flex: 1; border: none; outline: none;
      font-size: .92rem; font-family: inherit; color: #111827; background: none;
    }
    .search-bar input::placeholder { color: #9CA3AF; }
    .search-clear {
      background: none; border: none; cursor: pointer; padding: 2px;
      color: #9CA3AF; display: none; align-items: center;
    }
    .search-clear.show { display: flex; }
    .search-clear:hover { color: #6B7280; }

    .filter-pills {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .filter-pills::-webkit-scrollbar { display: none; }
    .filter-pill {
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.45);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.85);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 500;
      font-family: inherit;
      transition: all .15s;
    }
    .filter-pill:hover {
      background: rgba(255,255,255,.18);
      border-color: rgba(255,255,255,.75);
      color: white;
    }
    .filter-pill.active {
      background: white;
      border-color: white;
      color: #1A56E8;
      font-weight: 700;
    }

    /* ── Grid area ────────────────────────────────── */
    .catalog-body {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }
    .catalog-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .catalog-count {
      font-size: .84rem;
      color: rgba(255,255,255,.7);
      font-weight: 500;
    }
    .catalog-sort {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: .8rem;
      color: white;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      background-clip: padding-box;
    }
    .catalog-sort option { background: #1A56E8; }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: rgba(255,255,255,.6);
      font-size: .95rem;
    }

    /* ── Project cards ───────────────────────────── */
    .cat-card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      transition: transform .22s, box-shadow .22s;
      display: flex;
      flex-direction: column;
    }
    .cat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 32px rgba(0,0,0,.2);
    }

    .cat-img-wrap {
      position: relative;
      height: 196px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .cat-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .35s;
    }
    .cat-card:hover .cat-img-wrap img { transform: scale(1.05); }

    .cat-badge {
      position: absolute;
      top: 12px; left: 12px;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 700;
      color: white;
      letter-spacing: .3px;
    }
    .cat-volunteers-chip {
      position: absolute;
      bottom: 10px; right: 10px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: .7rem;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .cat-body {
      padding: 18px 18px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .cat-title {
      font-size: .97rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 7px;
      line-height: 1.3;
    }
    .cat-desc {
      font-size: .81rem;
      color: #6B7280;
      line-height: 1.55;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .cat-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .76rem;
      color: #9CA3AF;
      padding-top: 12px;
      border-top: 1px solid #F3F4F6;
      margin-bottom: 12px;
    }
    .cat-meta svg { flex-shrink: 0; }
    .cat-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .83rem;
      font-weight: 700;
      color: #F05A28;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: gap .15s, color .15s;
    }
    .cat-link:hover { color: #c9451a; gap: 9px; }

    @media (max-width: 900px)  { .catalog-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px)  { .catalog-grid { grid-template-columns: 1fr; } }
  </style>
</head>

        img: 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600&q=80',

    let activeCategory = '';
    let searchQuery    = '';

    // Build header stats
    function buildStats() {
      const totalVol = PROJECTS.reduce((s, p) => s + p.volunteers, 0);
      const cats     = new Set(PROJECTS.map(p => p.category)).size;
      document.getElementById('catalog-stats').innerHTML = `
        <span class="catalog-stat-chip">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          ${PROJECTS.length} Proyectos
        </span>
        <span class="catalog-stat-chip">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          ${cats} Categorías
        </span>
        <span class="catalog-stat-chip">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          ${totalVol}+ Voluntarios
        </span>
      `;
    }

    // Build category pills
    function buildPills() {
      const container = document.getElementById('filter-pills');
      const categories = [...new Set(PROJECTS.map(p => p.category))];
      const all = ['', ...categories];
      container.innerHTML = all.map(cat => {
        const label = cat ? (PILL_LABELS[cat] || cat) : 'Todas';
        const active = activeCategory === cat ? 'active' : '';
        return `<button class="filter-pill ${active}" data-cat="${cat}">${label}</button>`;
      }).join('');
      container.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.cat;
          buildPills();
          render();
        });
      });
    }

    function getSorted(list) {
      const sort = document.getElementById('catalog-sort').value;
      const arr = [...list];
      if (sort === 'volunteers-desc') return arr.sort((a, b) => b.volunteers - a.volunteers);
      if (sort === 'az') return arr.sort((a, b) => a.title.localeCompare(b.title));
      if (sort === 'za') return arr.sort((a, b) => b.title.localeCompare(a.title));
      return arr;
    }

    function render() {
      const q = searchQuery.toLowerCase();
      let list = PROJECTS.filter(p =>
        (!activeCategory || p.category === activeCategory) &&
        (!q || p.title.toLowerCase().includes(q) ||
               p.desc.toLowerCase().includes(q)  ||
               p.leader.toLowerCase().includes(q))
      );
      list = getSorted(list);

      document.getElementById('catalog-count').textContent =
        `Mostrando ${list.length} proyecto${list.length !== 1 ? 's' : ''}`;

      const grid = document.getElementById('catalog-grid');
      if (!list.length) {
        grid.innerHTML = '<div class="no-results">No se encontraron proyectos con esos filtros.</div>';
        return;
      }
      grid.innerHTML = list.map(p => {
        const color = CATEGORY_COLORS[p.category] || '#6B7280';
        const shortCat = PILL_LABELS[p.category] || p.category;
        return `
          <div class="cat-card">
            <div class="cat-img-wrap">
              <img src="${p.img}" alt="${p.title}" loading="lazy"/>
              <span class="cat-badge" style="background:${color}">${shortCat}</span>
              <span class="cat-volunteers-chip">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                ${p.volunteers} voluntarios
              </span>
            </div>
            <div class="cat-body">
              <div class="cat-title">${p.title}</div>
              <p class="cat-desc">${p.desc}</p>
              <div class="cat-meta">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                ${p.leader}
                <span style="margin-left:auto;display:flex;align-items:center;gap:4px">
                  <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${p.location}
                </span>
              </div>
              <button class="cat-link">
                Ver detalles
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </button>
            </div>
          </div>`;
      }).join('');
    }

    // Search events
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      searchClear.classList.toggle('show', !!searchQuery);
      render();
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('show');
      searchInput.focus();
      render();
    });
    document.getElementById('catalog-sort').addEventListener('change', render);

    // Init
    buildStats();
    buildPills();
    render();

    // Nav
    (function () {
      const stored = JSON.parse(localStorage.getItem('user') || 'null');
      const panel  = document.getElementById('user-panel');
      const avatar = document.getElementById('nav-avatar');
      const uname  = document.getElementById('nav-username');
      const logoutBtn  = document.getElementById('nav-logout');
      const perfilLink = document.querySelector('.nav-links a[href="login.html"]');

      function getFriendlyName(u) {
        if (u.nombre) return u.nombre;
        if (u.username) {
          const raw = u.username.includes('@') ? u.username.split('@')[0] : u.username;
          return raw.charAt(0).toUpperCase() + raw.slice(1);
        }
        return 'Usuario';
      }

      if (stored && stored.loggedIn) {
        const name = getFriendlyName(stored);
        panel.classList.add('visible');
        uname.textContent  = name;
        avatar.textContent = name[0].toUpperCase();
        if (perfilLink) perfilLink.setAttribute('href', 'profile.html');
      }

      logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('user');
        panel.classList.remove('visible');
        if (perfilLink) perfilLink.setAttribute('href', 'login.html');
        closeNav();
      });
    })();

    const menuBtn = document.getElementById('menu-btn');
    const sideNav = document.getElementById('side-nav');
    const overlay = document.getElementById('nav-overlay');

    function openNav()  { sideNav.classList.add('open'); overlay.classList.add('show'); menuBtn.classList.add('open'); }
    function closeNav() { sideNav.classList.remove('open'); overlay.classList.remove('show'); menuBtn.classList.remove('open'); }

    menuBtn.addEventListener('click', openNav);
    overlay.addEventListener('click', closeNav);
    document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', closeNav));
  </script>
</body>
</html>
