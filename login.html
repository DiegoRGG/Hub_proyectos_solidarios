<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión - Proyectos Solidarios</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/styles.css"/>
  <style>
    /* Password field – pink/purple border */
    #login-pass {
      border: 1.5px solid #C680E8 !important;
      background: white !important;
    }
    #login-pass:focus {
      border-color: #A855F7 !important;
      box-shadow: 0 0 0 3px rgba(168,85,247,.15) !important;
    }

    .lp-icon {
      width: 60px; height: 60px;
      background: #5AABF5;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }

    .btn-login { background: #4AAFF5; color: white; }
    .btn-login:hover { background: #2E9EF0; }

    .forgot-pass { color: #06C4E0; }
    .forgot-pass:hover { color: #0EA5C9; }
    .auth-alt a { color: #06C4E0; }
  </style>
</head>
<body class="subpage">

  <a href="index.html" class="back-link">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Inicio
  </a>

  <div class="auth-card">
    <div class="lp-icon">
      <svg width="28" height="28" fill="none" viewBox="0 0 24 24">
        <path d="M12 6a3 3 0 00-3 3v2H8a1 1 0 00-1 1v6a1 1 0 001 1h8a1 1 0 001-1v-6a1 1 0 00-1-1h-1V9a3 3 0 00-3-3zm0 2a1 1 0 011 1v2h-2V9a1 1 0 011-1zm0 6.25a1 1 0 110 2 1 1 0 010-2z" fill="white"/>
      </svg>
    </div>
    <h2 class="auth-title" style="color:#1A56E8">Bienvenido</h2>
    <p class="auth-sub">Inicia sesión para continuar</p>
    <form id="form-login" novalidate>
      <div class="form-field" id="field-user">
        <label>Usuario</label>
        <div class="field-wrap">
          <svg class="field-icon" width="18" height="18" fill="none" stroke="#9CA3AF" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="login-user" placeholder="Ingresa tu correo" autocomplete="username"/>
        </div>
        <span class="error-msg" id="err-user">Por favor ingresa tu usuario</span>
      </div>
      <div class="form-field" id="field-pass">
        <label>Contraseña</label>
        <div class="field-wrap">
          <svg class="field-icon" width="18" height="18" fill="none" stroke="#9CA3AF" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="login-pass" class="has-eye" placeholder="Ingresa tu contraseña" autocomplete="current-password"/>
          <button type="button" class="eye-btn" aria-label="Mostrar contraseña">
            <svg width="18" height="18" fill="none" stroke="#9CA3AF" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="error-msg" id="err-pass">Por favor ingresa tu contraseña</span>
      </div>
      <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
      <button type="submit" class="btn-full btn-login">Iniciar Sesión</button>
      <div class="auth-divider"><span>o</span></div>
      <p class="auth-alt">¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
    </form>
  </div>

  <script>
    document.querySelectorAll('.eye-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.closest('.field-wrap')?.querySelector('input');
        if (!input) return;
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });

    function setError(fieldId, errId, show) {
      document.getElementById(fieldId).classList.toggle('has-error', show);
      document.getElementById(errId).classList.toggle('show', show);
    }

    document.getElementById('form-login').addEventListener('submit', e => {
      e.preventDefault();
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value.trim();

      let valid = true;
      if (!user) { setError('field-user', 'err-user', true); valid = false; }
      else        { setError('field-user', 'err-user', false); }

      if (!pass)  { setError('field-pass', 'err-pass', true); valid = false; }
      else        { setError('field-pass', 'err-pass', false); }

      if (!valid) return;

      // Preserve registration data (nombre, email, rol) if it exists
      const existing = JSON.parse(localStorage.getItem('user') || '{}');
      localStorage.setItem('user', JSON.stringify({
        ...existing,
        username: user,
        loggedIn: true
      }));
      window.location.href = 'index.html';
    });

    // Clear error on input
    ['login-user', 'login-pass'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        const fieldId = id === 'login-user' ? 'field-user' : 'field-pass';
        const errId   = id === 'login-user' ? 'err-user'   : 'err-pass';
        setError(fieldId, errId, false);
      });
    });
  </script>
</body>
</html>
