<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Perfil - Proyectos Solidarios</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/styles.css"/>
  <link rel="stylesheet" href="styles/profile-edit.css"/>
</head>
<body class="subpage">

  <a href="profile.html" class="back-link">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Perfil
  </a>

  <div class="pf-wrap">
    <h1 class="pf-title">Editar Perfil</h1>
    <p class="pf-sub">Actualiza tu información personal y métodos de contacto</p>

    <div class="pf-card">
      <form id="form-edit" novalidate>

        <!-- Sección 1: Información Personal -->
        <div class="pf-section-hd">
          <div class="pf-sh-icon pf-sh-blue">
            <svg width="18" height="18" fill="none" stroke="#1A56E8" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </div>
          <h3>Información Personal</h3>
        </div>
        <hr class="pf-hr"/>

        <div class="pf-field" id="field-nombre">
          <label>Nombre Completo <span class="pf-req">*</span></label>
          <input type="text" id="ep-nombre" class="pf-input" placeholder="Tu nombre completo" autocomplete="name"/>
        </div>

        <div class="pf-field" id="field-email">
          <label>Correo Electrónico</label>
          <input type="email" id="ep-email" class="pf-input" placeholder="correo@ejemplo.com" autocomplete="email"/>
        </div>

        <div class="pf-field" id="field-rol">
          <label>Rol</label>
          <select id="ep-rol" class="pf-input pf-select">
            <option value="">Sin rol especificado</option>
            <option>Líder Social</option>
            <option>Voluntario</option>
            <option>Coordinador</option>
            <option>Administrador</option>
          </select>
        </div>

        <div class="pf-field" id="field-about">
          <label>Sobre mí</label>
          <textarea id="ep-about" class="pf-input pf-textarea" rows="4" placeholder="Cuéntanos algo sobre ti o tu proyecto..."></textarea>
        </div>

        <!-- Sección 2: Métodos de Contacto -->
        <div class="pf-section-hd" style="margin-top:28px">
          <div class="pf-sh-icon pf-sh-purple">
            <svg width="18" height="18" fill="none" stroke="#7C3AED" stroke-width="1.8" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.07 2.18 2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92v2z"/></svg>
          </div>
          <h3>Métodos de Contacto</h3>
        </div>
        <hr class="pf-hr"/>

        <div class="pf-field" id="field-phone">
          <label>Teléfono</label>
          <div class="pf-social-row">
            <div class="pf-social-icon" style="background:#dcfce7">
              <svg width="16" height="16" fill="none" stroke="#16A34A" stroke-width="1.8" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.07 2.18 2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92v2z"/></svg>
            </div>
            <input type="tel" id="ep-phone" class="pf-input" placeholder="+52 55 1234 5678"/>
          </div>
        </div>

        <div class="pf-field" id="field-linktree">
          <label>Sitio Web / LinkTree</label>
          <div class="pf-social-row">
            <div class="pf-social-icon" style="background:#ede9fe">
              <svg width="16" height="16" fill="none" stroke="#7C3AED" stroke-width="1.8" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            </div>
            <input type="text" id="ep-linktree" class="pf-input" placeholder="https://linktr.ee/tu-usuario"/>
          </div>
        </div>

        <div class="pf-field" id="field-instagram">
          <label>Instagram</label>
          <div class="pf-social-row">
            <div class="pf-social-icon" style="background:#fce7f3">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#E1306C" stroke-width="1.8"/><circle cx="12" cy="12" r="4" stroke="#E1306C" stroke-width="1.8"/><circle cx="17.5" cy="6.5" r="1.2" fill="#E1306C"/></svg>
            </div>
            <input type="text" id="ep-instagram" class="pf-input" placeholder="@tu.usuario"/>
          </div>
        </div>

        <div class="pf-field" id="field-linkedin">
          <label>LinkedIn</label>
          <div class="pf-social-row">
            <div class="pf-social-icon" style="background:#dbeafe">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4" stroke="#0A66C2" stroke-width="1.8"/><path d="M7 10v7M7 7v.5" stroke="#0A66C2" stroke-width="2" stroke-linecap="round"/><path d="M11 17v-3.5a2.5 2.5 0 015 0V17M11 10v7" stroke="#0A66C2" stroke-width="1.8" stroke-linecap="round"/></svg>
            </div>
            <input type="text" id="ep-linkedin" class="pf-input" placeholder="linkedin.com/in/tu-usuario"/>
          </div>
        </div>

        <div class="pf-actions">
          <button type="submit" class="btn-full btn-cyan-solid">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
            Guardar Cambios
          </button>
          <button type="button" class="btn-full btn-cancel" id="btn-cancel">Cancelar</button>
        </div>

      </form>
    </div>
  </div>

  <script src="scripts/profile-edit.js"></script>
</body>
</html>
